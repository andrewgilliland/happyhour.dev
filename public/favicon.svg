<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <style>
      @keyframes glow {
        0%, 100% { fill: #00f0ff; filter: drop-shadow(0 0 6px #00f0ff); }
        50% { fill: #ff00ea; filter: drop-shadow(0 0 6px #ff00ea); }
      }
      @keyframes ring {
        0%, 100% { stroke: #00f0ff; stroke-opacity: 0.6; }
        50% { stroke: #ff00ea; stroke-opacity: 0.6; }
      }
    </style>
  </defs>
  <rect width="128" height="128" rx="24" fill="#0a0a0f"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="none" stroke-width="3" style="animation: ring 3s ease-in-out infinite"/>
  <text x="64" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="56" letter-spacing="-2" style="animation: glow 3s ease-in-out infinite">HH</text>
</svg>
